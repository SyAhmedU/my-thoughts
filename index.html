<html lang="en">

<style>
  :root {

    --bg:#fbf7f1; --bg2:#f4eee5; --panel:#ffffff; --panel2:#fdfbf8;

    --line:#e7ddd1; --line2:#efe7db;
    --accent:#d2447a; --accent-soft:#fbe9f0;
    --shadow:0 1px 2px rgba(36,31,43,.04), 0 8px 28px rgba(36,31,43,.06);
    --font-ui:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
    --font-display:'Fraunces',Georgia,serif;
  }
  @media (prefers-color-scheme: dark) {

      --bg:#1a1620; --bg2:#211b29; --panel:#241e2d; --panel2:#2b2435;
      --ink:#f0eaf4; --muted:#a99fb6; --faint:#7d7389;
      --line:#352c41; --line2:#3d3349;
      --accent:#f178a6; --accent-soft:#34243000;
      --shadow:0 1px 2px rgba(0,0,0,.2), 0 10px 30px rgba(0,0,0,.28);
    }
  }
  * { box-sizing:border-box; }
  html,body { height:100%; }
  body {
    margin:0; background:var(--bg); color:var(--ink);
    font-family:var(--font-ui); font-size:15px; line-height:1.5;

  }
  button { font-family:inherit; cursor:pointer; }
  input,textarea { font-family:inherit; color:inherit; }

  .app { display:grid; grid-template-columns:340px 1fr; height:100dvh; }

  /* ── Sidebar ── */
  .side { background:var(--bg2); border-right:1px solid var(--line); display:flex; flex-direction:column; min-height:0; }
  .brand { display:flex; align-items:center; gap:11px; padding:18px 18px 14px; }
  .mark {
    width:34px; height:34px; border-radius:10px; flex:none;
    background:linear-gradient(135deg,var(--fire1),var(--fire2) 55%,var(--fire3));
    display:grid; place-items:center; color:#fff; font-weight:700;
    font-family:var(--font-display); font-size:18px;
    box-shadow:0 4px 12px rgba(241,69,117,.32);
  }
  .brand h1 { margin:0; font-family:var(--font-display); font-weight:600; font-size:20px; letter-spacing:-.01em; }
  .brand .tag { margin:1px 0 0; font-size:11.5px; color:var(--muted); }
  .side-tools { display:flex; gap:8px; align-items:center; margin-left:auto; }
  .icon-btn {
    width:34px; height:34px; border-radius:9px; border:1px solid var(--line);
    background:var(--panel); color:var(--muted); font-size:15px; display:grid; place-items:center;
    transition:.15s;
  }
  .icon-btn:hover { color:var(--ink); border-color:var(--accent); }

  .side-head { padding:4px 16px 12px; display:flex; flex-direction:column; gap:10px; }
  .new-btn {
    border:0; border-radius:11px; padding:11px 14px; color:#fff; font-weight:600; font-size:14.5px;
    background:linear-gradient(135deg,var(--fire1),var(--fire2) 60%,var(--fire3));
    box-shadow:0 4px 14px rgba(241,69,117,.28); display:flex; align-items:center; justify-content:center; gap:7px;
    transition:transform .12s, box-shadow .2s;
  }
  .new-btn:hover { box-shadow:0 6px 18px rgba(241,69,117,.4); }
  .new-btn:active { transform:scale(.985); }

  .search { position:relative; }
  .search input {
    width:100%; border:1px solid var(--line); border-radius:10px; background:var(--panel);
    padding:9px 11px 9px 32px; font-size:14px; outline:none;
  }
  .search input:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }
  .search .si { position:absolute; left:11px; top:50%; transform:translateY(-50%); color:var(--faint); font-size:13px; pointer-events:none; }

  .tagbar { display:flex; gap:6px; flex-wrap:wrap; padding:0 16px 8px; }
  .tagbar:empty { display:none; }
  .tfilter {
    border:1px solid var(--line); background:var(--panel); color:var(--muted);
    border-radius:999px; padding:3px 10px; font-size:12px; transition:.15s;
  }
  .tfilter:hover { color:var(--ink); }
  .tfilter.on { background:var(--accent); border-color:var(--accent); color:#fff; }

  .list { flex:1; overflow:auto; padding:4px 10px 16px; min-height:0; }
  .entry {
    border:1px solid transparent; border-radius:12px; padding:12px 13px; margin:4px 0; cursor:pointer;
    transition:.13s; position:relative;
  }
  .entry:hover { background:var(--panel); border-color:var(--line2); }
  .entry.active { background:var(--panel); border-color:var(--accent); box-shadow:var(--shadow); }
  .entry .et { font-weight:600; font-size:14.5px; display:flex; align-items:center; gap:6px; }
  .entry .et .pin { color:var(--accent); font-size:12px; }
  .entry .ex { color:var(--muted); font-size:12.5px; margin-top:3px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .entry .em { color:var(--faint); font-size:11px; margin-top:6px; display:flex; gap:8px; }
  .entry .etags { display:flex; gap:4px; flex-wrap:wrap; margin-top:7px; }
  .mini-tag { font-size:10.5px; color:var(--accent); background:var(--accent-soft); border:1px solid var(--line2); border-radius:999px; padding:1px 7px; }
  @media (prefers-color-scheme: dark){ .mini-tag{ background:#3a2a36; } }

  .empty-list { text-align:center; color:var(--faint); padding:40px 16px; font-size:13px; line-height:1.6; }

  /* ── Editor ── */
  .main { display:flex; flex-direction:column; min-width:0; background:var(--bg); }
  .ed-top { display:flex; align-items:center; gap:10px; padding:14px 22px; border-bottom:1px solid var(--line); }
  .back { display:none; }
  .ed-status { font-size:12px; color:var(--faint); display:flex; align-items:center; gap:6px; }
  .dot { width:7px; height:7px; border-radius:50%; background:var(--faint); }
  .dot.saved { background:#3fae6b; }
  .ed-actions { margin-left:auto; display:flex; gap:8px; align-items:center; }
  .act {
    border:1px solid var(--line); background:var(--panel); color:var(--muted);
    border-radius:9px; padding:7px 12px; font-size:13px; font-weight:500; transition:.15s; display:inline-flex; align-items:center; gap:6px;
  }
  .act:hover { color:var(--ink); border-color:var(--accent); }
  .act.danger:hover { color:#fff; background:#d1495b; border-color:#d1495b; }
  .act.rethink {
    color:#fff; border:0;
    background:linear-gradient(135deg,var(--fire2),var(--fire3));
    box-shadow:0 3px 10px rgba(146,112,244,.3);
  }
  .act.rethink:hover { color:#fff; }
  .act:active { transform:scale(.98); }

  .ed-body { flex:1; overflow:auto; min-height:0; display:flex; justify-content:center; }
  .ed-inner { width:100%; max-width:760px; padding:34px 28px 120px; }
  .title-in {
    width:100%; border:0; outline:none; background:transparent; color:var(--ink);
    font-family:var(--font-display); font-weight:600; font-size:33px; line-height:1.18; letter-spacing:-.015em;
    padding:0; margin-bottom:8px;
  }
  .title-in::placeholder { color:var(--faint); }
  .meta-row { display:flex; align-items:center; gap:12px; color:var(--faint); font-size:12px; margin-bottom:18px; flex-wrap:wrap; }
  .body-in {
    width:100%; border:0; outline:none; background:transparent; color:var(--ink);
    font-size:16.5px; line-height:1.7; resize:none; min-height:48vh; padding:0; display:block;
  }
  .body-in::placeholder { color:var(--faint); }

  .tags-edit { display:flex; align-items:center; gap:6px; flex-wrap:wrap; margin-top:26px; padding-top:18px; border-top:1px dashed var(--line2); }
  .tags-edit .lbl { font-size:11px; color:var(--faint); text-transform:uppercase; letter-spacing:.08em; font-weight:600; }
  .chip { display:inline-flex; align-items:center; gap:5px; background:var(--accent-soft); border:1px solid var(--line2); color:var(--accent); border-radius:999px; padding:3px 6px 3px 10px; font-size:12.5px; }
  @media (prefers-color-scheme: dark){ .chip{ background:#3a2a36; } }
  .chip button { border:0; background:transparent; color:var(--accent); font-size:13px; line-height:1; padding:0 2px; cursor:pointer; opacity:.7; }
  .chip button:hover { opacity:1; }
  .tag-in { border:0; outline:none; background:transparent; font-size:13px; min-width:90px; padding:4px 2px; color:var(--ink); }
  .tag-in::placeholder { color:var(--faint); }

  .blank { flex:1; display:grid; place-items:center; text-align:center; color:var(--faint); padding:40px; }
  .blank .bm { font-family:var(--font-display); font-size:26px; color:var(--muted); margin-bottom:8px; }
  .blank p { max-width:340px; line-height:1.6; font-size:14px; }

  .toast {
    position:fixed; left:50%; bottom:26px; transform:translateX(-50%) translateY(20px);
    background:var(--ink); color:var(--bg); padding:10px 18px; border-radius:999px; font-size:13px; font-weight:500;

  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  #importFile { display:none; }

  /* ── 2026-07 pass: stats · focus · [[links]] · mood · revisit · nudge ── */
  .stats-scrim{position:fixed;inset:0;z-index:60;background:rgba(20,14,30,.45);backdrop-filter:blur(3px);display:none;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto;}
  .stats-scrim.show{display:flex;}
  .stats-panel{background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);max-width:560px;width:100%;padding:22px 24px 26px;position:relative;}
  .stats-panel h2{font-family:var(--font-display);font-weight:600;font-size:20px;margin:0 0 4px;}
  .stats-sub{font-size:12px;color:var(--faint);margin-bottom:14px;}
  .stats-x{position:absolute;top:14px;right:14px;width:30px;height:30px;border-radius:999px;border:1px solid var(--line);background:var(--panel2);color:var(--muted);font-size:15px;cursor:pointer;}
  .stat-tiles{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;}
  .stile{flex:1 1 100px;background:var(--panel2);border:1px solid var(--line2);border-radius:12px;padding:10px 12px;}
  .stile b{display:block;font-family:var(--font-display);font-size:22px;color:var(--ink);}
  .stile span{font-size:11px;color:var(--muted);}
  .hm{display:grid;grid-template-rows:repeat(7,10px);grid-auto-flow:column;grid-auto-columns:10px;gap:3px;margin:6px 0 4px;overflow-x:auto;padding-bottom:4px;}
  .hm i{border-radius:2px;background:var(--line2);}
  .hm i.l1{background:#f7c8da;} .hm i.l2{background:#ef8db2;} .hm i.l3{background:var(--accent);}
  @media (prefers-color-scheme: dark){ .hm i.l1{background:#54364a;} .hm i.l2{background:#8f4a6d;} }
  .stats-lbl{font-size:11px;color:var(--faint);text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin:14px 0 6px;}
  .pairs{display:flex;gap:6px;flex-wrap:wrap;}
  .pair{font-size:12px;border:1px solid var(--line);border-radius:999px;padding:3px 10px;color:var(--muted);background:var(--panel2);cursor:pointer;}
  .pair b{color:var(--accent);font-weight:600;}
  .mood-row{display:flex;align-items:center;gap:6px;margin-top:14px;}
  .mood-row .lbl{font-size:11px;color:var(--faint);text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-right:4px;}
  .mood-b{border:1px solid var(--line);background:var(--panel);border-radius:999px;width:32px;height:32px;font-size:15px;opacity:.5;transition:.15s;}
  .mood-b:hover{opacity:.9;}
  .mood-b.on{opacity:1;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft);}
  .links-row{margin-top:14px;display:none;}
  .links-row.show{display:block;}
  .links-row .lbl{font-size:11px;color:var(--faint);text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-right:6px;}
  .link-chip{display:inline-flex;align-items:center;gap:4px;border:1px solid var(--line2);background:var(--accent-soft);color:var(--accent);border-radius:999px;padding:3px 10px;font-size:12px;cursor:pointer;margin:2px 4px 2px 0;}
  .link-chip.dead{opacity:.55;cursor:default;}
  @media (prefers-color-scheme: dark){ .link-chip{background:#3a2a36;} }
  .revisit{border:1px dashed var(--line);border-radius:12px;padding:11px 13px;margin:4px 0 8px;background:var(--panel2);}
  .revisit .rt{font-size:11px;color:var(--accent);font-weight:600;text-transform:uppercase;letter-spacing:.06em;display:flex;align-items:center;}
  .revisit .rx{margin-left:auto;border:0;background:none;color:var(--faint);cursor:pointer;font-size:13px;}

  body.focus .side{display:none;}
  body.focus .app{grid-template-columns:1fr;}

  body.focus .ed-inner::before {
    content:""; position:absolute; top:4.2vh; left:50%; width:64px; height:2px;
    transform:translateX(-50%); border-radius:2px; opacity:.55;
    background:linear-gradient(90deg, var(--fire1), var(--fire2) 55%, var(--fire3));
  }
  .dot.saved { box-shadow:0 0 0 3px rgba(63,174,107,.18); }

  @media (prefers-reduced-motion: reduce){
    body.enter *, .blank .bm, .new-btn:hover::after { animation:none !important; }

<body>

<script>
"use strict";
// ── Where "Rethink with AI" (project #30) lives. Update if the deploy URL differs. ──
const RETHINK_URL = "https://rethink-with-ai.vercel.app";

const KEY = "mythoughts_entries_v1";
const $ = id => document.getElementById(id);
const els = {
  list:$("list"), tagbar:$("tagbar"), search:$("searchIn"),
  editor:$("editor"), blank:$("blank"),
  title:$("titleIn"), body:$("bodyIn"), meta:$("metaRow"),
  chips:$("chips"), tagIn:$("tagIn"),
  saveDot:$("saveDot"), saveTxt:$("saveTxt"),
  toast:$("toast"),
};

let entries = load();
let activeId = null;
let tagFilter = null;
let saveTimer = null;

function load() {
  try { const a = JSON.parse(localStorage.getItem(KEY)); return Array.isArray(a) ? a : []; }
  catch { return []; }
}
function persist() { localStorage.setItem(KEY, JSON.stringify(entries)); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
function now() { return Date.now(); }

function fmt(ts) {
  const d = new Date(ts), n = new Date();
  const sameDay = d.toDateString() === n.toDateString();
  const time = d.toLocaleTimeString([], { hour:"numeric", minute:"2-digit" });
  if (sameDay) return "Today, " + time;
  const yest = new Date(n); yest.setDate(n.getDate() - 1);
  if (d.toDateString() === yest.toDateString()) return "Yesterday, " + time;
  return d.toLocaleDateString([], { month:"short", day:"numeric", year: d.getFullYear() !== n.getFullYear() ? "numeric" : undefined }) + ", " + time;
}
function words(s) { const t = (s || "").trim(); return t ? t.split(/\s+/).length : 0; }
function active() { return entries.find(e => e.id === activeId) || null; }

function toast(msg) {
  els.toast.textContent = msg; els.toast.classList.add("show");
  clearTimeout(toast._t); toast._t = setTimeout(() => els.toast.classList.remove("show"), 1800);
}

// ── Rendering ──
function allTags() {
  const set = new Set();
  entries.forEach(e => (e.tags || []).forEach(t => set.add(t)));
  return [...set].sort((a, b) => a.localeCompare(b));
}

function renderTagbar() {
  const tags = allTags();
  els.tagbar.innerHTML = tags.map(t =>
    `<button class="tfilter${tagFilter === t ? " on" : ""}" data-tag="${esc(t)}">#${esc(t)}</button>`
  ).join("");
}

// Query language: plain words (exact then fuzzy-subsequence), #tag tokens,
// after:YYYY-MM-DD / before:YYYY-MM-DD date filters.
function fuzzyWord(hayWords, w) {
  return hayWords.some(tok => { let i = 0; for (const ch of tok) { if (ch === w[i]) i++; if (i === w.length) return true; } return false; });
}
function matchQuery(e, qraw) {
  let q = qraw;
  const before = q.match(/before:(\d{4}-\d{2}-\d{2})/);
  if (before) { if (e.updated >= new Date(before[1] + "T23:59:59").getTime()) return false; q = q.replace(before[0], ""); }
  const after = q.match(/after:(\d{4}-\d{2}-\d{2})/);
  if (after) { if (e.updated <= new Date(after[1] + "T00:00:00").getTime()) return false; q = q.replace(after[0], ""); }
  for (const m of q.match(/#[\w-]+/g) || []) {
    if (!(e.tags || []).some(t => t.toLowerCase() === m.slice(1).toLowerCase())) return false;
    q = q.replace(m, "");
  }
  q = q.trim();
  if (!q) return true;
  const hay = (e.title + " " + e.body + " " + (e.tags || []).join(" ")).toLowerCase();
  if (hay.includes(q)) return true;
  const hayWords = hay.split(/[^a-z0-9]+/);
  return q.split(/\s+/).every(w => fuzzyWord(hayWords, w));
}

function visibleEntries() {
  const q = els.search.value.trim().toLowerCase();
  return entries
    .filter(e => !tagFilter || (e.tags || []).includes(tagFilter))
    .filter(e => !q || matchQuery(e, q))
    .sort((a, b) => (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0) || b.updated - a.updated);
}

// ── Revisit queue: resurface a thought from ~1 / 3 / 12 months ago ──
let REVISIT;
function revisitPick() {
  if (REVISIT !== undefined) return REVISIT;
  REVISIT = null;
  try { if (sessionStorage.getItem("mt_revisit_dismissed")) return REVISIT; } catch {}
  const nowT = Date.now();
  for (const [days, tol, label] of [[30, 4, "a month ago"], [91, 7, "three months ago"], [365, 14, "a year ago"]]) {
    const c = entries
      .filter(e => Math.abs((nowT - e.created) / 86400000 - days) <= tol && (e.body || e.title).trim())
      .sort((a, b) => a.created - b.created);
    if (c.length) { REVISIT = { e: c[0], label }; break; }
  }
  return REVISIT;
}
function revisitHTML() {
  const r = revisitPick();
  if (!r || tagFilter || els.search.value.trim()) return "";
  return `<div class="revisit"><div class="rt">↺ From ${r.label}<button class="rx" id="revisitX" title="Not now">×</button></div>
    <div class="rl" data-revisit="${r.e.id}">${esc(r.e.title.trim() || r.e.body.trim().slice(0, 60) || "Untitled thought")}</div></div>`;
}

function renderList() {
  const data = visibleEntries();
  if (!entries.length) {
    els.list.innerHTML = `<div class="empty-list">No thoughts yet.<br>Tap <b>＋ New thought</b> to begin.</div>`;
    return;
  }
  if (!data.length) {
    els.list.innerHTML = `<div class="empty-list">Nothing matches that.<br>Try a different search or tag.</div>`;
    return;
  }
  els.list.innerHTML = revisitHTML() + data.map(e => {
    const title = e.title.trim() || "Untitled thought";
    const excerpt = e.body.trim().replace(/\s+/g, " ").slice(0, 90) || "Empty — start writing…";
    const tags = (e.tags || []).slice(0, 3).map(t => `<span class="mini-tag">#${esc(t)}</span>`).join("");
    return `<div class="entry${e.id === activeId ? " active" : ""}" data-id="${e.id}">
      <div class="et">${e.pinned ? '<span class="pin">★</span>' : ""}${esc(title)}</div>
      <div class="ex">${esc(excerpt)}</div>
      ${tags ? `<div class="etags">${tags}</div>` : ""}
      <div class="em"><span>${fmt(e.updated)}</span><span>${words(e.body)} words</span></div>
    </div>`;
  }).join("");
}

function renderEditor() {
  const e = active();
  if (!e) {
    els.editor.style.display = "none";
    els.blank.style.display = "grid";
    document.body.classList.remove("editing");
    return;
  }
  els.blank.style.display = "none";
  els.editor.style.display = "flex";
  els.title.value = e.title;
  els.body.value = e.body;
  els.meta.innerHTML = `<span>${fmt(e.created)}</span><span>·</span><span id="wc">${words(e.body)} words</span>`;
  $("pinBtn").innerHTML = e.pinned ? "★ Pinned" : "☆ Pin";
  renderChips();
  renderMood();
  renderLinks();
}

function renderChips() {
  const e = active(); if (!e) return;
  els.chips.innerHTML = (e.tags || []).map((t, i) =>
    `<span class="chip">#${esc(t)}<button data-i="${i}" title="remove">×</button></span>`
  ).join("");
}

function renderAll() { renderTagbar(); renderList(); renderEditor(); }

function esc(s) { return String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c])); }

// ── Actions ──
function newThought() {
  const e = { id:uid(), title:"", body:"", tags:[], pinned:false, created:now(), updated:now() };
  entries.unshift(e);
  activeId = e.id;
  persist();
  renderAll();
  document.body.classList.add("editing");
  els.title.focus();
}

function openEntry(id) {
  activeId = id;
  document.body.classList.add("editing");
  renderAll();
  els.body.focus({ preventScroll:true });
}

function flagSaving() {
  els.saveDot.classList.remove("saved");
  els.saveTxt.textContent = "Saving…";
}
function flagSaved() {
  els.saveDot.classList.add("saved");
  els.saveTxt.textContent = "Saved";
}

function scheduleSave() {
  const e = active(); if (!e) return;
  flagSaving();
  e.title = els.title.value;
  e.body = els.body.value;
  e.updated = now();
  const wc = $("wc"); if (wc) wc.textContent = words(e.body) + " words";
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    persist();
    renderList(); renderTagbar(); renderLinks();
    flagSaved();
  }, 450);
}

function delThought() {
  const e = active(); if (!e) return;
  if (!confirm("Delete this thought? This can't be undone.")) return;
  entries = entries.filter(x => x.id !== e.id);
  activeId = null;
  persist();
  document.body.classList.remove("editing");
  renderAll();
  toast("Deleted");
}

function togglePin() {
  const e = active(); if (!e) return;
  e.pinned = !e.pinned; e.updated = now();
  persist(); renderAll();
  toast(e.pinned ? "Pinned to top" : "Unpinned");
}

function addTag(raw) {
  const e = active(); if (!e) return;
  const t = raw.trim().replace(/^#/, "").slice(0, 24);
  if (!t) return;
  e.tags = e.tags || [];
  if (!e.tags.includes(t)) { e.tags.push(t); e.updated = now(); persist(); renderChips(); renderTagbar(); renderList(); }
  els.tagIn.value = "";
}

function copyThought() {
  const e = active(); if (!e) return;
  const text = (e.title ? e.title + "\n\n" : "") + e.body;
  navigator.clipboard?.writeText(text).then(() => toast("Copied to clipboard"), () => toast("Couldn't copy"));
}

function rethink() {
  const e = active(); if (!e) return;
  const text = (e.title && e.body ? e.title + "\n\n" + e.body : (e.body || e.title)).trim();
  if (!text) { toast("Write something first"); return; }
  const payload = b64urlEncode(JSON.stringify({ t:text, title:e.title || "" }));
  window.open(RETHINK_URL + "/?t=" + payload, "_blank", "noopener");
}

function b64urlEncode(str) {
  return btoa(unescape(encodeURIComponent(str))).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
}

// ── Mood: self-rated, only you set it — never inferred ──
const MOODS = [["😞",1],["😐",2],["🙂",3],["😊",4],["✨",5]];
function renderMood() {
  const e = active(); const row = $("moodRow"); if (!row) return;
  if (!e) { row.innerHTML = ""; return; }
  row.innerHTML = '<span class="lbl">Mood</span>' + MOODS.map(([m, v]) =>
    `<button class="mood-b${e.mood === v ? " on" : ""}" data-mood="${v}" title="Self-rated — tap again to clear">${m}</button>`).join("");
}
$("moodRow").addEventListener("click", ev => {
  const b = ev.target.closest("[data-mood]"); if (!b) return;
  const e = active(); if (!e) return;
  const v = +b.dataset.mood;
  e.mood = e.mood === v ? undefined : v;
  e.updated = now(); persist(); renderMood();
});

// ── [[Wiki-links]] between thoughts: outgoing + computed backlinks ──
function outLinks(e) {
  const out = []; const re = /\[\[([^\[\]]{1,80})\]\]/g; let m;
  while ((m = re.exec(e.body || ""))) out.push(m[1].trim());
  return [...new Set(out)];
}
function renderLinks() {
  const e = active(); const row = $("linksRow"); if (!row) return;
  if (!e) { row.classList.remove("show"); row.innerHTML = ""; return; }
  const byTitle = new Map();
  entries.forEach(o => { const t = (o.title || "").trim().toLowerCase(); if (t && o.id !== e.id) byTitle.set(t, o.id); });
  const outs = outLinks(e);
  const myTitle = (e.title || "").trim().toLowerCase();
  const backs = myTitle ? entries.filter(o => o.id !== e.id && outLinks(o).some(t => t.toLowerCase() === myTitle)) : [];
  if (!outs.length && !backs.length) { row.classList.remove("show"); row.innerHTML = ""; return; }
  row.classList.add("show");
  row.innerHTML =
    (outs.length ? `<span class="lbl">Links to</span>` + outs.map(t => {
      const id = byTitle.get(t.toLowerCase());
      return `<span class="link-chip${id ? "" : " dead"}"${id ? ` data-goto="${id}"` : ` title="No thought titled “${esc(t)}” yet — write [[${esc(t)}]] as a title to create the link"`}>[[${esc(t)}]]</span>`;
    }).join("") : "")
    + (backs.length ? `<span class="lbl" style="margin-left:8px">Linked from</span>` + backs.map(o =>
      `<span class="link-chip" data-goto="${o.id}">← ${esc(o.title || "Untitled")}</span>`).join("") : "");
}
$("linksRow").addEventListener("click", ev => {
  const c = ev.target.closest("[data-goto]"); if (c) openEntry(c.dataset.goto);
});

// ── Focus mode ──
$("focusBtn").addEventListener("click", () => {
  document.body.classList.toggle("focus");
  toast(document.body.classList.contains("focus") ? "Focus — Esc to exit" : "Focus off");
});

// ── Stats panel: streak, activity heatmap, tags, mood trend — all on-device ──
function dayKey(ts) { const d = new Date(ts); return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0"); }
function activityMap() {
  const m = new Map();
  entries.forEach(e => { new Set([dayKey(e.created), dayKey(e.updated)]).forEach(k => m.set(k, (m.get(k) || 0) + 1)); });
  return m;
}
function calcStreak(m) {
  let s = 0; const d = new Date();
  if (!m.has(dayKey(d.getTime()))) d.setDate(d.getDate() - 1); // today can still be blank
  while (m.has(dayKey(d.getTime()))) { s++; d.setDate(d.getDate() - 1); if (s > 3650) break; }
  return s;
}
function heatmapHTML(m) {
  const DAYS = 119; const cells = [];
  const start = new Date(); start.setDate(start.getDate() - (DAYS - 1));
  for (let i = 0; i < start.getDay(); i++) cells.push('<i style="visibility:hidden"></i>');
  for (let i = 0; i < DAYS; i++) {
    const d = new Date(start); d.setDate(start.getDate() + i);
    const n = m.get(dayKey(d.getTime())) || 0;
    const l = n === 0 ? "" : n === 1 ? " class=\"l1\"" : n === 2 ? " class=\"l2\"" : " class=\"l3\"";
    cells.push(`<i${l} title="${dayKey(d.getTime())} — ${n} thought${n === 1 ? "" : "s"} touched"></i>`);
  }
  return `<div class="hm">${cells.join("")}</div>`;
}
function moodSparkHTML() {
  const pts = entries.filter(e => e.mood).sort((a, b) => a.created - b.created).slice(-30);
  if (pts.length < 2) return "";
  const w = 240, h = 40;
  const line = pts.map((e, i) => `${(i / (pts.length - 1) * w).toFixed(1)},${(h - 4 - (e.mood - 1) / 4 * (h - 8)).toFixed(1)}`).join(" ");
  return `<div class="stats-lbl">Mood you logged — last ${pts.length} rated thoughts</div>
    <svg class="spark2" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" role="img" aria-label="self-rated mood trend"><polyline points="${line}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linejoin="round"/></svg>`;
}
function tagPairs() {
  const c = new Map();
  entries.forEach(e => {
    const t = [...new Set(e.tags || [])].sort();
    for (let i = 0; i < t.length; i++) for (let j = i + 1; j < t.length; j++) {
      const k = t[i] + "|" + t[j]; c.set(k, (c.get(k) || 0) + 1);
    }
  });
  return [...c.entries()].sort((a, b) => b[1] - a[1]).slice(0, 10);
}
function openStats() {
  const m = activityMap();
  const totalWords = entries.reduce((s, e) => s + words(e.body), 0);
  const pairs = tagPairs();
  $("statsPanel").innerHTML = `
    <button class="stats-x" id="statsX" aria-label="Close">✕</button>
    <h2>Your writing</h2>
    <div class="stats-sub">Computed on this device from your own thoughts — nothing leaves it.</div>
    <div class="stat-tiles">
      <div class="stile"><b>${calcStreak(m)}</b><span>day streak</span></div>
      <div class="stile"><b>${entries.length}</b><span>thoughts</span></div>
      <div class="stile"><b>${totalWords.toLocaleString()}</b><span>words</span></div>
      <div class="stile"><b>${m.size}</b><span>active days</span></div>
    </div>
    <div class="stats-lbl">Last 17 weeks — days you created or edited a thought</div>
    ${heatmapHTML(m)}
    ${moodSparkHTML()}
    ${pairs.length ? `<div class="stats-lbl">Tags that travel together</div><div class="pairs">${pairs.map(([k, n]) => {
      const [a, b] = k.split("|");
      return `<button class="pair" data-pairtag="${esc(a)}">#${esc(a)} + #${esc(b)} <b>×${n}</b></button>`;
    }).join("")}</div>` : ""}`;
  $("statsScrim").classList.add("show");
}
$("statsBtn").addEventListener("click", openStats);
$("statsScrim").addEventListener("click", ev => {
  if (ev.target.id === "statsScrim" || ev.target.id === "statsX") { $("statsScrim").classList.remove("show"); return; }
  const p = ev.target.closest("[data-pairtag]");
  if (p) { tagFilter = p.dataset.pairtag; $("statsScrim").classList.remove("show"); renderTagbar(); renderList(); }
});

// ── Daily nudge (opt-out, on-device, generic prompts) ──
const NUDGES = [
  "What's taking up mental space right now?",
  "One thing you're avoiding — why?",
  "What went better than expected this week?",
  "If today repeated for a year, what would you change?",
  "What are you looking forward to?",
  "Something you changed your mind about recently?",
  "What would you tell yourself from a year ago?",
  "What's one small win from today?",
  "What's draining you lately — and what's feeding you?",
  "Describe today in three honest sentences.",
  "What decision are you sitting on?",
  "Who helped you recently? What did they do?",
  "What does 'enough' look like this month?",
  "What's a question you keep returning to?",
];
function renderNudge() {
  const n = $("nudge"); if (!n) return;
  renderBlankRug();
  let off = false; try { off = localStorage.getItem("mt_nudge_off") === "1"; } catch {}
  if (off) { n.style.display = "none"; return; }
  const p = NUDGES[Math.floor(Date.now() / 86400000) % NUDGES.length];
  n.innerHTML = `<b>Today's nudge</b>${esc(p)}<div class="nb"><button id="nudgeGo">Write from this</button><button id="nudgeOff" title="Never show nudges again">Hide forever</button></div>`;
  $("nudgeGo").onclick = () => { newThought(); els.title.value = p; scheduleSave(); els.body.focus(); };
  $("nudgeOff").onclick = () => { try { localStorage.setItem("mt_nudge_off", "1"); } catch {} n.style.display = "none"; };
}

// SYED-CONCEPT · Personal Pack jewel: the year heat rug — your real writing
// rhythm woven into the blank page (same on-device data as the stats panel).
function renderBlankRug() {
  const host = $("blankRug"); if (!host) return;
  const m = activityMap();
  if (m.size < 3) { host.innerHTML = ""; return; } // needs a little history to mean anything
  const streak = calcStreak(m);
  host.innerHTML = `
    <div style="margin-top:22px">
      <div style="font-size:11px;color:var(--faint);text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-bottom:2px">Your writing, last 17 weeks${streak > 1 ? ` · ${streak}-day streak` : ""}</div>
      ${heatmapHTML(m)}
    </div>`;
}

// ── Export / Import ──
function exportAll() {
  const blob = new Blob([JSON.stringify({ app:"my-thoughts", version:1, exported:new Date().toISOString(), entries }, null, 2)], { type:"application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "my-thoughts-backup-" + new Date().toISOString().slice(0, 10) + ".json";
  a.click(); URL.revokeObjectURL(a.href);
  toast("Backup downloaded");
}

// ── Encrypted backup: AES-GCM, key derived from a passphrase (PBKDF2).
//    No recovery path — the passphrase IS the key. ──
function u8b64(u8) { let s = ""; for (let i = 0; i < u8.length; i += 0x8000) s += String.fromCharCode.apply(null, u8.subarray(i, i + 0x8000)); return btoa(s); }
function b64u8(b) { const s = atob(b); const u = new Uint8Array(s.length); for (let i = 0; i < s.length; i++) u[i] = s.charCodeAt(i); return u; }
async function deriveKey(pass, salt) {
  const km = await crypto.subtle.importKey("raw", new TextEncoder().encode(pass), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey({ name: "PBKDF2", salt, iterations: 250000, hash: "SHA-256" }, km, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]);
}
async function exportEncrypted() {
  const pass = prompt("Passphrase for the encrypted backup.\nThere is NO recovery — lose it and the backup is unreadable.");
  if (!pass) return;
  try {
    const salt = crypto.getRandomValues(new Uint8Array(16));
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const key = await deriveKey(pass, salt);
    const ct = new Uint8Array(await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, new TextEncoder().encode(JSON.stringify(entries))));
    const out = { app: "my-thoughts", version: 1, encrypted: true, kdf: "PBKDF2-SHA256-250k", salt: u8b64(salt), iv: u8b64(iv), data: u8b64(ct) };
    const blob = new Blob([JSON.stringify(out)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "my-thoughts-encrypted-" + new Date().toISOString().slice(0, 10) + ".json";
    a.click(); URL.revokeObjectURL(a.href);
    toast("Encrypted backup downloaded");
  } catch { toast("Encryption failed in this browser"); }
}
async function decryptBackup(data) {
  const pass = prompt("This backup is encrypted — enter its passphrase:");
  if (!pass) return null;
  try {
    const key = await deriveKey(pass, b64u8(data.salt));
    const pt = await crypto.subtle.decrypt({ name: "AES-GCM", iv: b64u8(data.iv) }, key, b64u8(data.data));
    return JSON.parse(new TextDecoder().decode(pt));
  } catch { toast("Wrong passphrase (or corrupted file)"); return null; }
}

function importFile(file) {
  const reader = new FileReader();
  reader.onload = async () => {
    try {
      const data = JSON.parse(reader.result);
      let incoming = Array.isArray(data) ? data : data.entries;
      if (!incoming && data && data.encrypted) {
        incoming = await decryptBackup(data);
        if (!incoming) return;
      }
      if (!Array.isArray(incoming)) throw new Error("bad format");
      const byId = new Map(entries.map(e => [e.id, e]));
      let added = 0;
      incoming.forEach(raw => {
        if (!raw || typeof raw.body !== "string") return;
        const e = {
          id: raw.id || uid(),
          title: String(raw.title || ""),
          body: String(raw.body || ""),
          tags: Array.isArray(raw.tags) ? raw.tags.map(String) : [],
          pinned: !!raw.pinned,
          mood: [1,2,3,4,5].includes(raw.mood) ? raw.mood : undefined,
          created: Number(raw.created) || now(),
          updated: Number(raw.updated) || now(),
        };
        const existing = byId.get(e.id);
        if (!existing) { entries.push(e); byId.set(e.id, e); added++; }
        else if (e.updated > existing.updated) { Object.assign(existing, e); }
      });
      persist(); renderAll();
      toast(added ? `Imported ${added} thought${added > 1 ? "s" : ""}` : "Backup merged");
    } catch { toast("That file couldn't be read"); }
  };
  reader.readAsText(file);
}

// ── Events ──
$("newBtn").addEventListener("click", newThought);
els.list.addEventListener("click", ev => {
  if (ev.target.id === "revisitX") {
    try { sessionStorage.setItem("mt_revisit_dismissed", "1"); } catch {}
    REVISIT = null; renderList(); return;
  }
  const rv = ev.target.closest("[data-revisit]");
  if (rv) { openEntry(rv.dataset.revisit); return; }
  const card = ev.target.closest(".entry"); if (card) openEntry(card.dataset.id);
});
els.tagbar.addEventListener("click", ev => {
  const b = ev.target.closest(".tfilter"); if (!b) return;
  tagFilter = tagFilter === b.dataset.tag ? null : b.dataset.tag;
  renderTagbar(); renderList();
});
els.search.addEventListener("input", renderList);
els.title.addEventListener("input", scheduleSave);
els.body.addEventListener("input", scheduleSave);
els.body.addEventListener("input", autoGrow);
$("backBtn").addEventListener("click", () => { document.body.classList.remove("editing"); activeId = null; renderList(); });
$("delBtn").addEventListener("click", delThought);
$("pinBtn").addEventListener("click", togglePin);
$("copyBtn").addEventListener("click", copyThought);
$("rethinkBtn").addEventListener("click", rethink);
els.chips.addEventListener("click", ev => {
  const b = ev.target.closest("button[data-i]"); if (!b) return;
  const e = active(); if (!e) return;
  e.tags.splice(+b.dataset.i, 1); e.updated = now(); persist(); renderChips(); renderTagbar(); renderList();
});
els.tagIn.addEventListener("keydown", ev => {
  if (ev.key === "Enter" || ev.key === ",") { ev.preventDefault(); addTag(els.tagIn.value); }
  else if (ev.key === "Backspace" && !els.tagIn.value) {
    const e = active(); if (e && e.tags.length) { e.tags.pop(); e.updated = now(); persist(); renderChips(); renderTagbar(); renderList(); }
  }
});
$("exportBtn").addEventListener("click", exportAll);
$("exportEncBtn").addEventListener("click", exportEncrypted);
$("importBtn").addEventListener("click", () => $("importFile").click());
$("importFile").addEventListener("change", ev => { if (ev.target.files[0]) importFile(ev.target.files[0]); ev.target.value = ""; });

function autoGrow() {
  els.body.style.height = "auto";
  els.body.style.height = Math.max(els.body.scrollHeight, window.innerHeight * 0.48) + "px";
}

document.addEventListener("keydown", ev => {
  if (ev.key === "Escape" && document.body.classList.contains("focus")) { document.body.classList.remove("focus"); return; }
  const mod = ev.metaKey || ev.ctrlKey;
  if (mod && ev.key.toLowerCase() === "n") { ev.preventDefault(); newThought(); }
  else if (mod && ev.key.toLowerCase() === "s") { ev.preventDefault(); const e = active(); if (e) { e.title = els.title.value; e.body = els.body.value; persist(); flagSaved(); toast("Saved"); } }
  else if (ev.key === "/" && document.activeElement !== els.search && !/INPUT|TEXTAREA/.test(document.activeElement.tagName)) { ev.preventDefault(); els.search.focus(); }
});

// ── Init ──
renderAll();
renderNudge();

// PWA share-target intake: ./?title=&text=&url= → new thought, then clean URL.
(function () {
  const sp = new URLSearchParams(location.search);
  const text = [sp.get("text"), sp.get("url")].filter(Boolean).join("\n");
  const title = sp.get("title") || "";
  if (!text && !title) return;
  const e = { id: uid(), title: title.slice(0, 120), body: text, tags: ["captured"], pinned: false, created: now(), updated: now() };
  entries.unshift(e); activeId = e.id; persist();
  history.replaceState(null, "", location.pathname);
  renderAll();
  document.body.classList.add("editing");
  toast("Captured from share");
})();

if (!activeId && entries.length && window.innerWidth > 820) { openEntry(visibleEntries()[0]?.id || entries[0].id); }
autoGrow();

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(() => {}));
}

// SYED-WAVE8 · entrance plays after the gate unlocks, not behind it
(function () {
  function play() {
    document.body.classList.add("enter");
    setTimeout(() => document.body.classList.remove("enter"), 1800);
  }
  const gate = document.getElementById("syed-gate");
  if (!gate) { play(); return; }
  new MutationObserver((_, obs) => {
    if (!document.getElementById("syed-gate")) { obs.disconnect(); play(); }
  }).observe(document.body, { childList: true });
})();
</script>
